# BigTreeTech Octopus Pro v1.1 - Standardized Alias Mapping (YOUR Voron 2.4 350mm wiring)
# MCU: STM32H723
# Logical driver mapping (8 drivers total):
#   DRIVER0 = MOTOR0 slot = X
#   DRIVER1 = MOTOR6 slot = Extruder (temporary; move to toolhead later)
#   DRIVER2 = MOTOR1 slot = Y
#   DRIVER3 = MOTOR7 slot = unused
#   DRIVER4 = MOTOR2 slot = Z0 (front left)
#   DRIVER5 = MOTOR3 slot = Z1 (rear left)
#   DRIVER6 = MOTOR4 slot = Z2 (rear right)
#   DRIVER7 = MOTOR5 slot = Z3 (front right)
# TMC5160 SPI (shared soft SPI bus) on DRIVER0,2,4-7
# TMC2209 UART on DRIVER1 (extruder)
# Endstops: ENDSTOP0=X, ENDSTOP1=Y, ENDSTOP2=Z (easy to reassign)
# Status: Human-verified from your exact working config

[board_pins]
aliases:
    # === Stepper Drivers (0-7) ===
    DRIVER0_STEP=PF13, DRIVER0_DIR=PF12, DRIVER0_ENABLE=PF14, DRIVER0_CS=PC4,      # X - MOTOR0
    DRIVER1_STEP=PG0,  DRIVER1_DIR=PG1,  DRIVER1_ENABLE=PF15, DRIVER1_UART=PD11,    # Extruder - MOTOR6 (TMC2209)
    DRIVER2_STEP=PF11, DRIVER2_DIR=PG3,  DRIVER2_ENABLE=PG5,  DRIVER2_CS=PC6,      # Y - MOTOR1
    DRIVER3_STEP=PG4,  DRIVER3_DIR=PC1,  DRIVER3_ENABLE=PA2,  DRIVER3_CS=PC7,      # MOTOR7 slot - unused

    DRIVER4_STEP=PF9,  DRIVER4_DIR=PF10, DRIVER4_ENABLE=PG2,  DRIVER4_CS=PF2,      # Z0 front left - MOTOR2
    DRIVER5_STEP=PC13, DRIVER5_DIR=PF0,  DRIVER5_ENABLE=PF1,  DRIVER5_CS=PE4,      # Z1 rear left - MOTOR3 (Pro 1.1 enable)
    DRIVER6_STEP=PE2,  DRIVER6_DIR=PE3,  DRIVER6_ENABLE=PD4,  DRIVER6_CS=PE1,      # Z2 rear right - MOTOR4
    DRIVER7_STEP=PE6,  DRIVER7_DIR=PA14, DRIVER7_ENABLE=PE0,  DRIVER7_CS=PD3,      # Z3 front right - MOTOR5

    # Shared Soft SPI for all TMC5160 (X, Y, Z0-Z3)
    SPI_MOSI=PA7,
    SPI_MISO=PA6,
    SPI_SCLK=PA5,

    # === Heaters & Thermistors ===
    HE0=PA0,    # Hotend
    HB=PA1,     # Bed
    TH0=PF4,    # Hotend thermistor
    THB=PF3,    # Bed thermistor

    # === Fans ===
    FAN0=PA8,   # Part cooling
    FAN1=PE5,   # Hotend fan
    FAN2=PD12,  # Controller fan
    FAN3=PD13,  # Exhaust fan (optional)

    # === Endstops (remappable) ===
    ENDSTOP0=PG6,   # X axis
    ENDSTOP1=PG10,  # Y axis
    ENDSTOP2=PG12,  # Z axis (only one mechanical Z endstop on Voron 2.4)

    # === Probe ===
    PROBE=PC5,

    # === EXP Headers ===
    # EXP1 header
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,    # Slot in the socket on this side
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,      # Slot in the socket on this side
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<5V>
